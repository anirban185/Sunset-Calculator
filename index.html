<!DOCTYPE html>
<html>

<head>
    <title>Sunset Calculator</title>
    <link rel="stylesheet" href="Style.css">
    <script src="https://unpkg.com/tz-lookup@6.1.2/tz.js"></script>
</head>

<body>
    <h2>Sunset Calculator</h2>
    <div class="input" id="input-lat">
        <label>Latitude:</label>
        <input type="number" id="lat" placeholder="Enter Your Latitude" />
    </div>
    <div class="input" id="input-lon">
        <label>Longitude:</label>
        <input type="number" id="lon" placeholder="Enter Your Longitude" />
    </div>
    <button type="button" onclick="getGPS()">Use GPS</button>
    <button type="button" onclick="calculate()">Calculate</button>
    <p id="result"></p>
    <p id="countdown"></p>
    <script src="Script.js"></script>
</body>

</html>
